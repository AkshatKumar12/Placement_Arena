<!doctype html>
<html>
  <head>
    <title>WebRTC Classroom</title>
  </head>
  <body>
    <h2>WebRTC Classroom</h2>
    <p>Open both roles:</p>
    <button id="openBoth">Open Teacher + Student</button>
    <p>
      Or open individually:
      <a href="./teacher.html">Teacher</a> |
      <a href="./student.html">Student</a>
    </p>

    <script>
      document.getElementById("openBoth").addEventListener("click", () => {
        window.open("./teacher.html", "_blank", "noopener,noreferrer");
        window.open("./student.html", "_blank", "noopener,noreferrer");
      });
    </script>
  </body>
</html>
